name: Agent Approved Implementation

on:
    issues:
        types:
            - labeled

jobs:
    implement:
        if: github.event.label.name == 'agent:approved' && contains(github.event.issue.labels.*.name, 'agent:ready')
        runs-on: ubuntu-latest

        permissions:
            contents: write
            issues: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Create working branch
              id: branch
              run: |
                  branch="codex/issue-${{ github.event.issue.number }}-${{ github.run_id }}"
                  git switch -c "$branch"
                  echo "branch=$branch" >> "$GITHUB_OUTPUT"

            - name: Write issue context
              env:
                  ISSUE_URL: ${{ github.event.issue.html_url }}
                  ISSUE_TITLE: ${{ github.event.issue.title }}
                  ISSUE_BODY: ${{ github.event.issue.body }}
              run: |
                  {
                    printf 'Issue URL:\n%s\n\n' "$ISSUE_URL"
                    printf 'Issue title:\n%s\n\n' "$ISSUE_TITLE"
                    printf 'Issue body:\n%s\n' "$ISSUE_BODY"
                  } > .github/codex/issue-context.md

            - name: Run Codex implementation
              id: codex
              uses: openai/codex-action@v1
              with:
                  openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                  prompt-file: .github/codex/prompts/issue-implement.md
                  sandbox: workspace-write
                  effort: medium

            - name: Detect changes
              id: changes
              run: |
                  if git diff --quiet && git diff --cached --quiet; then
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Commit changes
              if: steps.changes.outputs.changed == 'true'
              run: |
                  git config user.name "fleetbase-agent"
                  git config user.email "actions@github.com"
                  git add -A
                  git commit -m "fix: address issue #${{ github.event.issue.number }}"

            - name: Push branch
              if: steps.changes.outputs.changed == 'true'
              run: git push origin "${{ steps.branch.outputs.branch }}"

            - name: Open pull request
              if: steps.changes.outputs.changed == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
                  CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
              run: |
                  body_file="$(mktemp)"
                  {
                    printf '%s\n\n' "$CODEX_FINAL_MESSAGE"
                    printf 'Closes #%s\n' "${{ github.event.issue.number }}"
                  } > "$body_file"

                  gh pr create \
                    --base main \
                    --head "${{ steps.branch.outputs.branch }}" \
                    --title "fix: address issue #${{ github.event.issue.number }}" \
                    --body-file "$body_file"

            - name: Comment when no changes were produced
              if: steps.changes.outputs.changed != 'true'
              uses: actions/github-script@v7
              env:
                  CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
              with:
                  github-token: ${{ github.token }}
                  script: |
                      const message = process.env.CODEX_FINAL_MESSAGE?.trim();
                      const body = [
                        'Codex completed the approved implementation run, but no file changes were produced.',
                        message ? `\n${message}` : '',
                      ].join('\n');

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.issue.number,
                        body,
                      });
