name: Agent Ready Triage

on:
    issues:
        types:
            - labeled

jobs:
    triage:
        if: github.event.label.name == 'agent:ready'
        runs-on: ubuntu-latest

        permissions:
            contents: read
            issues: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  path: storefront

            - name: Checkout ember-ui
              uses: actions/checkout@v5
              with:
                  repository: fleetbase/ember-ui
                  path: ember-ui

            - name: Checkout ember-core
              uses: actions/checkout@v5
              with:
                  repository: fleetbase/ember-core
                  path: ember-core

            - name: Checkout core-api
              uses: actions/checkout@v5
              with:
                  repository: fleetbase/core-api
                  path: core-api

            - name: Write issue context
              env:
                  ISSUE_URL: ${{ github.event.issue.html_url }}
                  ISSUE_TITLE: ${{ github.event.issue.title }}
                  ISSUE_BODY: ${{ github.event.issue.body }}
              run: |
                  {
                    printf 'Issue URL:\n%s\n\n' "$ISSUE_URL"
                    printf 'Issue title:\n%s\n\n' "$ISSUE_TITLE"
                    printf 'Issue body:\n%s\n' "$ISSUE_BODY"
                  } > .github/codex/issue-context.md

            - name: Run Codex triage
              id: codex
              uses: openai/codex-action@v1
              with:
                  openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                  working-directory: storefront
                  prompt-file: storefront/.github/codex/prompts/issue-triage.md
                  sandbox: read-only
                  effort: medium

            - name: Comment with Codex triage
              uses: actions/github-script@v7
              env:
                  CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
              with:
                  github-token: ${{ github.token }}
                  script: |
                      const body = process.env.CODEX_FINAL_MESSAGE?.trim();
                      if (!body) {
                        core.warning('Codex returned an empty triage message.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.issue.number,
                        body,
                      });
